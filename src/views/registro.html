<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Lorena Braids</title>
    <link rel="stylesheet" href="/css/output.css" />
  </head>
  <body
    class="bg-linear-to-br from-amber-50 to-orange-100 min-h-screen flex items-center justify-center p-4"
  >
    <!-- Contenedor principal -->
    <div class="w-full max-w-md">
      <!-- Logo y título -->
      <div class="text-center mb-8 flex flex-col items-center">
        <img
          src="/images/logo.png"
          alt="LorenaBraids"
          class="h-20 w-auto mb-4"
        />
        <p class="text-gray-600">Crea tu cuenta</p>
      </div>

      <!-- Formulario de Registro -->
      <div class="bg-white rounded-2xl shadow-2xl p-8">
        <!-- Mensaje de error (oculto por defecto) -->
        <div
          id="error-message"
          class="hidden mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg"
        >
          <p class="text-sm"></p>
        </div>

        <!-- Mensaje de éxito (oculto por defecto) -->
        <div
          id="success-message"
          class="hidden mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg"
        >
          <p class="text-sm"></p>
        </div>

        <form id="registro-form">
          <!-- Nombre completo -->
          <div class="mb-4">
            <label for="nombre" class="block text-gray-700 font-semibold mb-2">
              Nombre Completo
            </label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition"
              placeholder="Juan Pérez"
            />
          </div>

          <!-- Email -->
          <div class="mb-4">
            <label for="email" class="block text-gray-700 font-semibold mb-2">
              Email
            </label>
            <input
              type="email"
              id="email"
              name="email"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition"
              placeholder="tu@email.com"
            />
          </div>

          <!-- Teléfono -->
          <div class="mb-4">
            <label
              for="telefono"
              class="block text-gray-700 font-semibold mb-2"
            >
              Teléfono (opcional)
            </label>
            <input
              type="number"
              id="telefono"
              name="telefono"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition"
              placeholder="+56 9 1234 5678"
            />
          </div>

          <!-- Contraseña -->
          <div class="mb-4">
            <label
              for="password"
              class="block text-gray-700 font-semibold mb-2"
            >
              Contraseña
            </label>
            <input
              type="password"
              id="password"
              name="password"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition"
              placeholder="Mínimo 6 caracteres"
            />
          </div>

          <!-- Confirmar contraseña -->
          <div class="mb-6">
            <label
              for="confirm-password"
              class="block text-gray-700 font-semibold mb-2"
            >
              Confirmar Contraseña
            </label>
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition"
              placeholder="Repite tu contraseña"
            />
          </div>

          <!-- Términos y condiciones -->
          <div class="mb-6">
            <label class="flex items-start">
              <input
                type="checkbox"
                id="terms"
                class="w-4 h-4 mt-1 text-amber-600 border-gray-300 rounded focus:ring-amber-500"
              />
              <span class="ml-2 text-sm text-gray-600">
                Acepto los
                <a href="#" class="text-amber-600 hover:text-amber-700"
                  >términos y condiciones</a
                >
                y la
                <a href="#" class="text-amber-600 hover:text-amber-700"
                  >política de privacidad</a
                >
              </span>
            </label>
          </div>

          <!-- Botón de registro -->
          <button
            type="submit"
            id="registro-btn"
            class="w-full bg-linear-to-r from-amber-500 to-orange-600 text-white font-bold py-3 rounded-lg hover:from-amber-600 hover:to-orange-700 transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5"
          >
            Crear Cuenta
          </button>
        </form>

        <!-- Separador -->
        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500">O</span>
          </div>
        </div>

        <!-- Link a login -->
        <div class="text-center">
          <p class="text-gray-600 text-sm">
            ¿Ya tienes cuenta?
            <a
              href="/login"
              class="text-amber-600 font-semibold hover:text-amber-700"
            >
              Inicia sesión aquí
            </a>
          </p>
        </div>

        <!-- Link a inicio -->
        <div class="text-center mt-4">
          <a href="/" class="text-sm text-gray-500 hover:text-gray-700">
            ← Volver al inicio
          </a>
        </div>
      </div>
    </div>

    <!-- JavaScript externo -->
    <script src="/js/registro.js"></script>
  </body>
</html>
