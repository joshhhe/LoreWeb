<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Lorena Braids</title>
    <link rel="stylesheet" href="/css/output.css" />
  </head>
  <body
    class="bg-gradient-to-br from-amber-50 to-orange-100 min-h-screen flex items-center justify-center p-4"
  >
    <!-- Contenedor principal -->
    <div class="w-full max-w-md">
      <!-- Logo y título -->
      <div class="text-center mb-8 flex flex-col items-center">
        <img
          src="/images/logo.png"
          alt="LorenaBraids"
          class="h-20 w-auto mb-4"
        />
        <p class="text-gray-600">Inicia sesión en tu cuenta</p>
      </div>

      <!-- Formulario de Login -->
      <div class="bg-white rounded-2xl shadow-2xl p-8">
        <!-- Mensaje de error (oculto por defecto) -->
        <div
          id="error-message"
          class="hidden mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg"
        >
          <p class="text-sm"></p>
        </div>

        <!-- Mensaje de éxito (oculto por defecto) -->
        <div
          id="success-message"
          class="hidden mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg"
        >
          <p class="text-sm"></p>
        </div>

        <form id="login-form">
          <!-- Email -->
          <div class="mb-6">
            <label for="email" class="block text-gray-700 font-semibold mb-2">
              Email
            </label>
            <input
              type="email"
              id="email"
              name="email"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition"
              placeholder="tu@email.com"
            />
          </div>

          <!-- Contraseña -->
          <div class="mb-6">
            <label
              for="password"
              class="block text-gray-700 font-semibold mb-2"
            >
              Contraseña
            </label>
            <input
              type="password"
              id="password"
              name="password"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition"
              placeholder="••••••••"
            />
          </div>

          <!-- Recordar sesión -->
          <div class="flex items-center justify-between mb-6">
            <label class="flex items-center">
              <input
                type="checkbox"
                class="w-4 h-4 text-amber-600 border-gray-300 rounded focus:ring-amber-500"
              />
              <span class="ml-2 text-sm text-gray-600">Recordarme</span>
            </label>
            <a href="#" class="text-sm text-amber-600 hover:text-amber-700">
              ¿Olvidaste tu contraseña?
            </a>
          </div>

          <!-- Botón de login -->
          <button
            type="submit"
            id="login-btn"
            class="w-full bg-gradient-to-r from-amber-500 to-orange-600 text-white font-bold py-3 rounded-lg hover:from-amber-600 hover:to-orange-700 transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5"
          >
            Iniciar Sesión
          </button>
        </form>

        <!-- Separador -->
        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500">O</span>
          </div>
        </div>

        <!-- Link a registro -->
        <div class="text-center">
          <p class="text-gray-600 text-sm">
            ¿No tienes cuenta?
            <a
              href="/registro"
              class="text-amber-600 font-semibold hover:text-amber-700"
            >
              Regístrate aquí
            </a>
          </p>
        </div>

        <!-- Link a inicio -->
        <div class="text-center mt-4">
          <a href="/" class="text-sm text-gray-500 hover:text-gray-700">
            ← Volver al inicio
          </a>
        </div>
      </div>
    </div>

    <!-- JavaScript externo -->
    <script src="/js/login.js"></script>
  </body>
</html>
