<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - LoreWeb</title>
    <link rel="stylesheet" href="/css/output.css" />
  </head>
  <body class="bg-gray-50 min-h-screen text-gray-700">
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white shadow-sm">
      <nav class="container mx-auto px-6 py-4">
        <div class="flex justify-between items-center">
          <div class="flex items-center gap-4">
            <a href="/" class="cursor-pointer">
              <img
                src="/images/logo.png"
                alt="LorenaBraids"
                class="h-10 w-auto hover:opacity-80 transition"
              />
            </a>
            <span class="text-sm text-gray-500">Panel Admin</span>
          </div>

          <div class="flex items-center gap-4">
            <div
              class="flex items-center gap-2 bg-amber-50 px-3 py-2 rounded-full border border-amber-200"
            >
              <svg
                class="w-5 h-5 text-amber-600"
                fill="currentColor"
                viewBox="0 0 20 20"
              >
                <path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" />
              </svg>
              <span
                id="adminNameDisplay"
                class="text-sm font-medium text-gray-800"
                >Admin</span
              >
            </div>
            <button
              id="logoutBtn"
              class="text-gray-700 hover:text-red-600 px-3 py-1 rounded-md hover:bg-red-50"
            >
              Salir
            </button>
          </div>
        </div>
      </nav>
    </header>

    <main class="container mx-auto px-6 py-8">
      <div class="flex flex-col lg:flex-row gap-6">
        <!-- Left column: Services & Products CRUD -->
        <section class="flex-1 space-y-6">
          <!-- Services -->
          <div class="bg-white rounded-xl shadow p-6 border border-gray-100">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-lg font-semibold text-gray-800">Servicios</h2>
              <div class="flex items-center gap-2">
                <button
                  id="newServiceBtn"
                  class="bg-amber-600 text-white px-3 py-1 rounded-md text-sm hover:bg-amber-700"
                >
                  Nuevo
                </button>
              </div>
            </div>

            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="text-left text-gray-500">
                  <tr>
                    <th class="pb-2">Nombre</th>
                    <th class="pb-2">Duración (minutos)</th>
                    <th class="pb-2">Precio</th>
                    <th class="pb-2">Acciones</th>
                  </tr>
                </thead>
                <tbody id="servicesTbody" class="divide-y"></tbody>
              </table>
            </div>
          </div>

          <!-- Products -->
          <div class="bg-white rounded-xl shadow p-6 border border-gray-100">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-lg font-semibold text-gray-800">Productos</h2>
              <div class="flex items-center gap-2">
                <button
                  id="newProductBtn"
                  class="bg-amber-600 text-white px-3 py-1 rounded-md text-sm hover:bg-amber-700"
                >
                  Nuevo
                </button>
              </div>
            </div>

            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="text-left text-gray-500">
                  <tr>
                    <th class="pb-2">Nombre</th>
                    <th class="pb-2">Stock</th>
                    <th class="pb-2">Descripción</th>
                    <th class="pb-2">Precio</th>
                    <th class="pb-2">Categoria</th>
                    <th class="pb-2">Acciones</th>
                  </tr>
                </thead>
                <tbody id="productsTbody" class="divide-y"></tbody>
              </table>
            </div>
          </div>
        </section>

        <!-- Right column: Appointments -->
        <aside class="w-full lg:w-96">
          <div class="bg-white rounded-xl shadow p-6 border border-gray-100">
            <h3 class="text-lg font-semibold mb-4">Agenda (próximas citas)</h3>
            <div class="space-y-3">
              <ul id="appointmentsList" class="divide-y"></ul>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <footer class="container mx-auto px-6 py-6 text-sm text-gray-500">
      © 2024 LorenaBraids
    </footer>

    <div
      id="serviceModal"
      class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center"
    >
      <div class="bg-white rounded-xl shadow-lg w-full max-w-md mx-4">
        <div
          class="flex items-center justify-between p-6 border-b border-gray-200"
        >
          <h3 class="text-lg font-semibold text-gray-800">Agregar Servicio</h3>
          <button
            id="closeServiceModal"
            class="text-gray-400 hover:text-gray-600"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
        <form id="serviceForm" class="p-6 space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Nombre del servicio</label
            >
            <input
              id="nombre"
              type="text"
              name="nombre"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500"
              placeholder="Ej: Box Braids"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Duración (minutos)</label
            >
            <input
              type="number"
              name="duracion"
              id="duracion"
              min="1"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500"
              placeholder="60"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Precio</label
            >
            <input
              type="number"
              name="precio"
              id="precio"
              min="0"
              step="0.01"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500"
              placeholder="500"
            />
          </div>

          <!-- Botones -->
          <div class="flex gap-3 pt-4">
            <button
              type="submit"
              class="flex-1 bg-amber-600 text-white py-2 rounded-lg hover:bg-amber-700 font-medium"
            >
              Guardar
            </button>
            <button
              type="button"
              id="cancelServiceModal"
              class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg hover:bg-gray-300 font-medium"
            >
              Cancelar
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Productos Modal -->

    <div
      id="productoModal"
      class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center"
    >
      <div class="bg-white rounded-xl shadow-lg w-full max-w-md mx-4">
        <div
          class="flex items-center justify-between p-6 border-b border-gray-200"
        >
          <h3 class="text-lg font-semibold text-gray-800">Agregar Productos</h3>
          <button
            id="closeProductoModal"
            class="text-gray-400 hover:text-gray-600"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
        <form id="productForm" class="p-6 space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Nombre del producto</label
            >
            <input
              id="nombreProducto"
              type="text"
              name="nombre"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500"
              placeholder="Ej: Box Braids"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Stock</label
            >
            <input
              type="number"
              name="stock"
              id="stockProducto"
              min="1"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500"
              placeholder="60"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Precio</label
            >
            <input
              type="number"
              name="precio"
              id="precioProducto"
              min="0"
              step="0.01"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500"
              placeholder="500"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Descripción Productos</label
            >
            <textarea
              name="descripcion"
              id="descripcionProducto"
              rows="3"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500"
              placeholder="Descripción del producto"
            ></textarea>
          </div>

          <!-- Botones -->
          <div class="flex gap-3 pt-4">
            <button
              type="submit"
              class="flex-1 bg-amber-600 text-white py-2 rounded-lg hover:bg-amber-700 font-medium"
            >
              Guardar
            </button>
            <button
              type="button"
              id="cancelProductoModal"
              class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg hover:bg-gray-300 font-medium"
            >
              Cancelar
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- SweetAlert2 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="/js/dashboardAdmin.js"></script>
  </body>
</html>
